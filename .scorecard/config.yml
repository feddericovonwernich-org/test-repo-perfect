service:
  name: "test-repo-perfect"
  team: "Platform Engineering"
  description: "Reference implementation demonstrating all scorecards best practices"
  links:
    - name: "OpenAPI Specification"
      url: "https://github.com/feddericovonwernich/test-repo-perfect/blob/master/openapi.yaml"
      description: "API contract and schema definitions"

    - name: "API Explorer"
      url: "https://api.example.com/swagger-ui"
      description: "Interactive Swagger UI for testing endpoints"

    - name: "Documentation Portal"
      url: "https://docs.example.com/services/perfect-api"
      description: "Comprehensive service documentation"

    - name: "Incident Runbook"
      url: "https://confluence.example.com/display/ENG/Perfect+API+Runbook"
      description: "Troubleshooting guides and escalation procedures"

openapi:
  spec_file: "openapi.yaml"
  environments:
    production:
      base_url: "https://api.example.com/v1"
      description: "Production environment"
    staging:
      base_url: "https://staging-api.example.com/v1"
      description: "Staging environment for pre-production testing"
    development:
      base_url: "http://localhost:8000"
      description: "Local development server"
